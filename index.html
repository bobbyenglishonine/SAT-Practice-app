/* ---------------- UTILS ---------------- */
function qs(id){ return document.getElementById(id); }
function qsa(s){ return document.querySelectorAll(s); }
function show(s){
  Object.values(screens).forEach(x => x.classList.add('hidden'));
  screens[s].classList.remove('hidden');
}
function key(){ return `${section}-${currentModule * 100 + index}`; }
function format(t){ return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`; }

/* ---------------- STATE & ELEMENTS ---------------- */
let section, currentModule = 0, index = 0, answers = {}, timeLeft, timerId = null, paused = false;

const screens = { select: qs('screen-select'), q: qs('screen-question'), r: qs('screen-result') };
const timerEl = qs('timer'), pauseBtn = qs('pauseBtn');
const nextBtn = qs('nextBtn'), prevBtn = qs('prevBtn');
const exitBtn = qs('exitBtn');
const exitBtnResult = qs('exitBtnResult');

/* ---------------- INIT ---------------- */
qsa('.startBtn').forEach(b => b.onclick = () => start(b.dataset.section));
nextBtn.onclick = () => nav(1);
prevBtn.onclick = () => nav(-1);
pauseBtn.onclick = togglePause;

if (exitBtn) exitBtn.onclick = exitToMain;
if (exitBtnResult) exitBtnResult.onclick = exitToMain;


function initMenu() {
  const sections = {
    RW:   { labelSel: '.rw-label',   timeSel: '.rw-time',   name: 'Reading & Writing' },
    MATH: { labelSel: '.math-label', timeSel: '.math-time', name: 'Math' }
  };

  Object.entries(sections).forEach(([key, cfg]) => {
    const totalQ   = DATA[key].modules.reduce((sum, m) => sum + m.length, 0);
    const totalSec = calcTime(key);
    const mins     = Math.floor(totalSec / 60);
    const secs     = String(totalSec % 60).padStart(2, '0');

    document.querySelector(cfg.labelSel).textContent =
      `${cfg.name} (${totalQ} Question${totalQ !== 1 ? 's' : ''})`;
    document.querySelector(cfg.timeSel).textContent =
      `${mins}:${secs}`;
  });
}

initMenu();

/* ---------------- APP LOGIC ---------------- */

/*--TIMER--*/

function calcTime(sec) {
  const totalQ = DATA[sec].modules.reduce((sum, m) => sum + m.length, 0);
  return totalQ * 60; // 1 minute per question
}


function start(sec){
  stopTimer();

  section = sec; currentModule = 0; index = 0; answers = {};
  paused = false;
  pauseBtn.textContent = 'Pause';
  pauseBtn.classList.add('bg-yellow-400');
  pauseBtn.classList.remove('bg-green-400');

  timeLeft = calcTime(section);
  show('q');
  startTimer();
  render();
}

function render(){
  const moduleQuestions = DATA[section].modules[currentModule];
  const q = moduleQuestions[index];

  const totalInSection = DATA[section].modules.reduce((sum, m) => sum + m.length, 0);
  const prevModulesCount = DATA[section].modules.slice(0, currentModule).reduce((sum, m) => sum + m.length, 0);
  const overallIndex = prevModulesCount + index + 1;

  qs('qCounter').textContent = `Q ${overallIndex} of ${totalInSection}`;

  const sectionLabel = section === 'MATH' ? 'Math' : 'Reading & Writing';
  qs('moduleLabel').textContent = `${sectionLabel} Module ${currentModule + 1}`;

  let html = "";
  if (q.img) {
    html += `<img src="${q.img}" alt="Question ${q.id} image"
      class="h-auto border rounded-lg shadow-sm mb-4"
      style="max-width:65%; max-height:65%;"
    />`;
  }
  html += q.q;
  qs('questionText').innerHTML = html;

  const currentAnswer = answers[key()];

  prevBtn.disabled = (currentModule === 0 && index === 0);
  const isLastInModule = index === moduleQuestions.length - 1;
  const isLastModule = currentModule === DATA[section].modules.length - 1;
  nextBtn.textContent = (isLastModule && isLastInModule) ? 'Finish Section' : 'Next';
  nextBtn.disabled = !currentAnswer;

  const o = qs('options'); o.innerHTML = '';

  if (q.options) {
    Object.entries(q.options).forEach(([k, v]) => {
      const btn = document.createElement('button');
      btn.className = `w-full text-left p-4 border-2 rounded-lg shadow-sm transition text-xl leading-relaxed ${
        currentAnswer === k
          ? 'bg-indigo-600 text-white border-indigo-700 shadow-md'
          : 'bg-yellow-50 hover:bg-yellow-100 border-yellow-200'
      }`;
      btn.innerHTML = `${k}. ${v}`;
      btn.onclick = () => {
        answers[key()] = k;
        render();
      };
      o.appendChild(btn);
    });
  } else {
    const wrapper = document.createElement('div');
    wrapper.className = 'mt-2';
    const label = document.createElement('p');
    label.className = 'text-slate-500 text-base mb-2';
    label.textContent = 'Enter your answer:';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Type your answer here';
    input.value = currentAnswer || '';
    input.className = 'w-full p-4 border-2 rounded-lg text-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200';
    input.oninput = () => {
      const val = input.value.trim();
      answers[key()] = val;
      nextBtn.disabled = !val;
    };
    wrapper.appendChild(label);
    wrapper.appendChild(input);
    o.appendChild(wrapper);
  }

  MathJax.Hub.Queue(["Typeset", MathJax.Hub, qs('questionText')]);
  MathJax.Hub.Queue(["Typeset", MathJax.Hub, o]);
}

function nav(dir){
  const totalQuestionsInModule = DATA[section].modules[currentModule].length;
  const totalModules = DATA[section].modules.length;

  index += dir;

  if (dir === 1 && index >= totalQuestionsInModule) {
    if (currentModule < totalModules - 1) {
      currentModule++;
      index = 0;
    } else {
      return finish();
    }
  } else if (dir === -1 && index < 0) {
    if (currentModule > 0) {
      currentModule--;
      index = DATA[section].modules[currentModule].length - 1;
    } else {
      index = 0;
    }
  }
  render();
}

function finish(){
  stopTimer();
  show('r');
  review();
}

function exitToMain(){
  stopTimer();

  section = null;
  currentModule = 0;
  index = 0;
  answers = {};
  timeLeft = 0;
  paused = false;

  timerEl.classList.add('hidden');
  pauseBtn.classList.add('hidden');
  pauseBtn.textContent = 'Pause';
  pauseBtn.classList.add('bg-yellow-400');
  pauseBtn.classList.remove('bg-green-400');

  timerEl.classList.remove('text-red-800', 'animate-pulse');
  timerEl.classList.add('text-red-600');

  show('select');
}

function review(){
  let correct = 0, total = 0;
  const box = qs('review'); box.innerHTML = '';
  let qIndex = 0;

  DATA[section].modules.forEach((moduleQuestions, moduleIdx) => {
    moduleQuestions.forEach((q, indexInModule) => {
      total++;
      const complexKey = `${section}-${moduleIdx * 100 + indexInModule}`;
      const a = answers[complexKey] || null;
      const isFreeResponse = !q.options;

      let ok;
      if (isFreeResponse) {
        ok = a !== null && String(a).trim().toLowerCase() === String(q.correct).trim().toLowerCase();
      } else {
        ok = a === q.correct;
      }
      if (ok) correct++;

      const yourAnswerText = a
        ? (isFreeResponse ? a : `${a}. ${q.options[a]}`)
        : "Unanswered";
      const correctAnswerText = isFreeResponse
        ? `${q.correct}`
        : `${q.correct}. ${q.options[q.correct]}`;

      box.innerHTML += `
        <div class="border-2 p-4 rounded-lg shadow-sm ${ok ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'}">
          <p class="font-medium text-xl mb-5">Q${qIndex + 1}: ${q.q}</p>
          <p class="text-xl text-slate-700">Your Answer: <span class="font-semibold">${yourAnswerText}</span></p>
          <p class="text-xl text-green-700">Correct Answer: <span class="font-semibold">${correctAnswerText}</span></p>
          <div class="mt-3 pt-3 border-t border-slate-200">
            <p class="text-xl text-slate-500 font-semibold">Explanation:</p>
            <p class="text-xl italic leading-relaxed">${q.explain}</p>
          </div>
        </div>`;
      qIndex++;
    });
  });

  qs('scoreSummary').textContent = `Final Score: ${correct} / ${total} Correct`;

  MathJax.Hub.Queue(["Typeset", MathJax.Hub, box]);
}

function startTimer(){
  timerEl.classList.remove('hidden');
  pauseBtn.classList.remove('hidden');
  timerEl.textContent = format(timeLeft);

  stopTimer();

  timerId = setInterval(() => {
    if (paused) return;
    timeLeft--;
    timerEl.textContent = format(timeLeft);
    if (timeLeft <= 60) {
      timerEl.classList.add('text-red-800', 'animate-pulse');
    } else {
      timerEl.classList.remove('text-red-800', 'animate-pulse');
    }
    if (timeLeft <= 0) finish();
  }, 1000);
}

function stopTimer(){
  if (timerId) clearInterval(timerId);
  timerId = null;
}

function togglePause(){
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  pauseBtn.classList.toggle('bg-yellow-400', !paused);
  pauseBtn.classList.toggle('bg-green-400', paused);
}

show('select');

</script>
</body>
</html>
